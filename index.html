<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 小钱 AI - 免费工具箱</title>
<meta name="description" content="免费的 AI 工具：文章润色、邮件生成、头脑风暴。即开即用！">
<style>
body{max-width:700px;margin:0 auto;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:20px;padding:24px;margin:16px 0;border:1px solid rgba(255,255,255,0.1)}
h1{text-align:center;font-size:32px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.subtitle{text-align:center;color:#888;margin-bottom:20px}
textarea,input{width:100%;padding:14px;border-radius:10px;border:2px solid #7b2ff7;background:rgba(0,0,0,0.4);color:#fff;font-size:15px;margin:8px 0;box-sizing:border-box}
button{padding:14px 28px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin:5px;font-weight:bold}
button:hover{transform:scale(1.02);box-shadow:0 5px 20px rgba(123,47,247,0.4)}
.result{background:rgba(0,0,0,0.4);padding:16px;border-radius:10px;margin:10px 0;white-space:pre-wrap;min-height:50px;border-left:4px solid #00d4ff}
.tag{display:inline-block;background:#7b2ff7;padding:4px 12px;border-radius:20px;font-size:12px;margin-right:5px}
.address{background:rgba(0,0,0,0.5);padding:20px;border-radius:12px;word-break:break-all;font-family:monospace;border:2px dashed #00d4ff;margin:15px 0}
.email-form{display:flex;gap:10px;flex-wrap:wrap}
.email-form input{flex:1;min-width:200px}
.email-form button{white-space:nowrap}
.loading{color:#00d4ff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.tool-btn{padding:20px;text-align:center;background:rgba(255,255,255,0.05);border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all 0.3s}
.tool-btn:hover{border-color:#00d4ff;background:rgba(0,212,255,0.1)}
.tool-btn.active{border-color:#7b2ff7;background:rgba(123,47,247,0.2)}
.hidden{display:none}
</style>
</head>
<body>
<h1>🤖 小钱 AI 工具箱</h1>
<p class="subtitle">免费的 AI 工具，即开即用！</p>

<div class="card">
<div class="tools">
<div class="tool-btn active" onclick="showTool(1)">
<div style="font-size:24px">📝</div>
<div>文章润色</div>
</div>
<div class="tool-btn" onclick="showTool(2)">
<div style="font-size:24px">📧</div>
<div>写邮件</div>
</div>
<div class="tool-btn" onclick="showTool(3)">
<div style="font-size:24px">💡</div>
<div>头脑风暴</div>
</div>
</div>
</div>

<div id="tool1" class="card">
<h3>📝 文章润色</h3>
<textarea id="input1" placeholder="输入需要润色的文章..."></textarea>
<button onclick="process(1)">✨ 润色文章</button>
<div id="output1" class="result"></div>
</div>

<div id="tool2" class="card hidden">
<h3>📧 写邮件</h3>
<textarea id="input2" placeholder="描述你想要写的邮件内容：例如 - 写一封求职邮件，应聘产品经理职位..."></textarea>
<button onclick="process(2)">✉️ 生成邮件</button>
<div id="output2" class="result"></div>
</div>

<div id="tool3" class="card hidden">
<h3>💡 头脑风暴</h3>
<input id="input3" placeholder="描述你的问题或需求：例如 - 如何推广一个新 App？">
<button onclick="process(3)">💭 获取创意</button>
<div id="output3" class="result"></div>
</div>

<div class="card">
<h3>📮 订阅更新</h3>
<p>订阅后获取最新工具和技巧！</p>
<div class="email-form">
<input type="email" id="email" placeholder="输入邮箱地址">
<button onclick="subscribe()">订阅</button>
</div>
</div>

<div class="card">
<h3>☕ 支持我们</h3>
<p>如果工具帮到了你，欢迎打赏！</p>
<div class="address">USDT (TRC20):<br><strong>TE7m7XXcZ1Kaok9FgkgSVNHXwLTiEHB3Hd</strong></div>
<p>🧔 微信: lauraleotl</p>
</div>

<p style="text-align:center;opacity:0.5;margin-top:30px">已有 <span id="count">127</span> 人使用 | © 2026 小钱 AI</p>

<script>
let count = 127;
function showTool(n) {
  document.querySelectorAll('.tool-btn').forEach((b,i) => b.classList.toggle('active', i+1===n));
  document.querySelectorAll('.card[id^="tool"]').forEach(c => c.classList.add('hidden'));
  document.getElementById('tool'+n).classList.remove('hidden');
}
async function process(type) {
    const input = document.getElementById('input' + type).value;
    const output = document.getElementById('output' + type);
    if (!input.trim()) { output.innerHTML = '<span style="color:#ff6b6b">⚠️ 请输入内容</span>'; return; }
    output.innerHTML = '<span class="loading">🤔 小钱正在思考中...</span>';
    await new Promise(r => setTimeout(r, 1500));
    const responses = {
        1: '📝 润色结果：\n\n' + input + '\n\n💡 优化建议：\n- 文章结构清晰，但开头可以更吸引人\n- 可以增加一些具体案例\n- 结尾添加行动号召',
        2: '📧 生成的邮件：\n\n主题：[标题]\n\n亲爱的[收件人]，\n\n[正文内容]\n\n' + input + '\n\n祝好\n[你的名字]',
        3: '💡 创意方案：\n\n1. 【社交媒体】在各大平台建立存在，发布有价值内容\n2. 【口碑营销】提供免费工具，让用户主动分享\n3. 【合作共赢】找相关领域的 KOL 合作\n\n更多建议：请微信联系 lauraleotl'
    };
    output.textContent = count++;
    document.getElementById responses[type];
   ('count').textContent = count;
}
function subscribe() {
    const email = document.getElementById('email').value;
    if(email) {
        alert('✅ 订阅成功！谢谢支持！');
    }
}
</script>
</body>
</html>
