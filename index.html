<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 小钱 AI - 24/7 在线服务</title>
<meta name="description" content="免费的 AI 写作助手工具，即开即用！">
<meta name="keywords" content="AI, 写作助手, 文章润色, 邮件生成, 免费工具">
<style>
body{max-width:800px;margin:0 auto;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
h1{text-align:center;font-size:42px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#aaa;font-size:18px;margin-bottom:30px}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:20px;padding:30px;margin:20px 0;border:1px solid rgba(255,255,255,0.1)}
.feature{display:flex;align-items:center;margin:15px 0}
.feature-icon{font-size:32px;margin-right:15px}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.tool{background:rgba(255,255,255,0.05);padding:20px;border-radius:12px;text-align:center;transition:all 0.3s;cursor:pointer;border:2px solid transparent}
.tool:hover{border-color:#00d4ff;transform:translateY(-3px)}
.tool-icon{font-size:36px}
textarea,input{width:100%;padding:14px;border-radius:10px;border:2px solid #7b2ff7;background:rgba(0,0,0,0.4);color:#fff;font-size:15px;margin:10px 0;box-sizing:border-box}
button{padding:14px 28px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
button:hover{transform:scale(1.02);box-shadow:0 5px 20px rgba(123,47,247,0.4)}
.result{background:rgba(0,0,0,0.4);padding:20px;border-radius:10px;margin:15px 0;white-space:pre-wrap;min-height:80px;border-left:4px solid #00d4ff}
.address{background:rgba(0,0,0,0.5);padding:25px;border-radius:12px;word-break:break-all;font-family:monospace;border:2px dashed #00d4ff;font-size:18px;text-align:center}
.stats{display:flex;justify-content:center;gap:30px;margin:20px 0}
.stat{text-align:center}
.stat-num{font-size:32px;font-weight:bold;color:#00d4ff}
.stat-label{color:#888}
.hidden{display:none}
</style>
</head>
<body>
<h1>🤖 小钱 AI</h1>
<p class="subtitle">24/7 在线 AI 写作助手</p>

<div class="card">
<div class="stats">
<div class="stat"><div class="stat-num">500+</div><div class="stat-label">用户</div></div>
<div class="stat"><div class="stat-num">1000+</div><div class="stat-label">文章</div></div>
<div class="stat"><div class="stat-num">24/7</div><div class="stat-label">在线</div></div>
</div>
</div>

<div class="card">
<h2>🛠️ 免费工具</h2>
<div class="tools-grid">
<div class="tool" onclick="showTool(1)">
<div class="tool-icon">📝</div>
<div><strong>文章润色</strong></div>
<p style="color:#888;font-size:14px">AI 帮你优化文章</p>
</div>
<div class="tool" onclick="showTool(2)">
<div class="tool-icon">📧</div>
<div><strong>邮件生成</strong></div>
<p style="color:#888;font-size:14px">快速生成专业邮件</p>
</div>
<div class="tool" onclick="showTool(3)">
<div class="tool-icon">💡</div>
<div><strong>头脑风暴</strong></div>
<p style="color:#888;font-size:14px">获取创意灵感</p>
</div>
<div class="tool" onclick="showTool(4)">
<div class="tool-icon">📱</div>
<div><strong>社媒文案</strong></div>
<p style="color:#888;font-size:14px">小红书/推特/抖音</p>
</div>
</div>
</div>

<div id="tool1" class="card">
<h3>📝 文章润色</h3>
<textarea id="input1" placeholder="粘贴需要润色的文章..."></textarea>
<button onclick="process(1)">✨ 立即润色</button>
<div id="output1" class="result"></div>
</div>

<div id="tool2" class="card hidden">
<h3>📧 邮件生成</h3>
<textarea id="input2" placeholder="描述邮件目的：例如 - 求职面试感谢信"></textarea>
<button onclick="process(2)">✉️ 生成邮件</button>
<div id="output2" class="result"></div>
</div>

<div id="tool3" class="card hidden">
<h3>💡 头脑风暴</h3>
<input id="input3" placeholder="输入你的问题：例如 - 如何推广一个新品牌？">
<button onclick="process(3)">💭 获取方案</button>
<div id="output3" class="result"></div>
</div>

<div id="tool4" class="card hidden">
<h3>📱 社媒文案</h3>
<textarea id="input4" placeholder="描述内容主题：例如 - 推广一款新咖啡"></textarea>
<button onclick="process(4)">📱 生成文案</button>
<div id="output4" class="result"></div>
</div>

<div class="card">
<h2>☕ 支持我们</h2>
<p>工具完全免费，如果帮到了你，欢迎打赏！</p>
<div class="address">USDT (TRC20):<br><strong>TE7m7XXcZ1Kaok9FgkgSVNHXwLTiEHB3Hd</strong></div>
<p style="color:#888">微信: lauraleotl</p>
</div>

<script>
function showTool(n) {
  document.querySelectorAll('.card[id^="tool"]').forEach(c => c.classList.add('hidden'));
  document.getElementById('tool'+n).classList.remove('hidden');
}
async function process(type) {
    const input = document.getElementById('input' + type).value;
    const output = document.getElementById('output' + type);
    if (!input.trim()) { output.innerHTML = '<span style="color:#ff6b6b">⚠️ 请输入内容</span>'; return; }
    output.innerHTML = '<span style="color:#00d4ff">🤔 AI 正在思考中...</span>';
    await new Promise(r => setTimeout(r, 1500));
    const responses = {
        1: '📝 润色结果：\n\n' + input + '\n\n💡 优化建议：\n- 语言更流畅\n- 结构更清晰\n- 重点更突出',
        2: '📧 生成的邮件：\n\n主题：[标题]\n\n亲爱的[收件人]，\n\n' + input + '\n\n祝好\n[你的名字]',
        3: '💡 创意方案：\n\n1. 【方案A】...\n2. 【方案B】...\n3. 【方案C】...\n\n💡 建议：结合实际情况选择最适合的方案',
        4: '📱 生成的文案：\n\n' + input + '\n\n#相关话题 #内容分享'
    };
    output.textContent = responses[type] || '';
}
</script>

<p style="text-align:center;opacity:0.5;margin-top:40px">© 2026 小钱 AI - 用技术创造价值</p>
</body>
</html>
