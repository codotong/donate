<style>
body{max-width:800px;margin:0 auto;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
h1{text-align:center;font-size:48px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#ccc;line-height:1.8}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:20px;padding:30px;margin:20px 0;border:1px solid rgba(255,255,255,0.1)}

.tool:hover{border-color:#00d4ff}
textarea,input{width:100%;padding:14px;border-radius:10px;border:2px solid #7b2ff7;background:rgba(0,0,0,0.4);color:#fff;font-size:15px;margin:10px 0;box-sizing:border-box}
button{padding:14px 28px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold}
.result{background:rgba(0,0,0,0.4);padding:20px;border-radius:10px;margin:15px 0;white-space:pre-wrap;min-height:80px}
.address{background:rgba(0,0,0,0.5);padding:25px;border-radius:12px;word-break:break-all;font-family:monospace;border:2px dashed #00d4ff;font-size:20px;text-align:center;margin:15px 0}
.hidden{display:none}
.share-buttons{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap}
.share-btn{padding:10px 20px;background:rgba(255,255,255,0.1);border-radius:8px;text-decoration:none;color:#fff;display:inline-block}
</style>
</head>
<body>
<h1>🤖 小钱 AI</h1>
<p style="text-align:center;font-size:20px">24/7 免费 AI 写作助手</p>

<div class="card">
<h2>🛠️ 工具列表</h2>
<div class="tool" onclick="showTool(1)">
<strong>📝 文章润色</strong> - AI 帮你优化文章
</div>
<div class="tool" onclick="showTool(2)">
<strong>📧 邮件生成</strong> - 快速生成专业邮件
</div>
<div class="tool" onclick="showTool(3)">
<strong>💡 头脑风暴</strong> - 获取创意灵感
</div>
<div class="tool" onclick="showTool(4)">
<strong>📱 社媒文案</strong> - 小红书/抖音/推特
</div>
</div>

<div id="tool1" class="card">
<h3>📝 文章润色</h3>
<textarea id="input1" placeholder="粘贴需要润色的文章..."></textarea>
<button onclick="process(1)">✨ 润色</button>
<div id="output1" class="result"></div>
</div>

<div id="tool2" class="card hidden">
<h3>📧 邮件生成</h3>
<textarea id="input2" placeholder="描述邮件目的..."></textarea>
<button onclick="process(2)">✉️ 生成</button>
<div id="output2" class="result"></div>
</div>

<div id="tool3" class="card hidden">
<h3>💡 头脑风暴</h3>
<input id="input3" placeholder="输入你的问题...">
<button onclick="process(3)">💭 获取</button>
<div id="output3" class="result"></div>
</div>

<div id="tool4" class="card hidden">
<h3>📱 社媒文案</h3>
<textarea id="input4" placeholder="描述内容主题..."></textarea>
<button onclick="process(4)">📱 生成</button>
<div id="output4" class="result"></div>
</div>

<div class="card">
<h2>💰 支持我们</h2>
<p>如果工具帮到了你，欢迎打赏！</p>
<div class="address">USDT (TRC20):<br><strong>TE7m7XXcZ1Kaok9FgkgSVNHXwLTiEHB3Hd</strong></div>
<p>🧔 微信: lauraleotl</p>
</div>

<div class="card">
<h2>📤 分享给朋友</h2>
<div class="share-buttons">
<a class="share-btn" href="mailto:?subject=小钱AI工具&body=推荐一个免费的AI工具：https://codotong.github.io/donate">📧 邮件分享</a>
<a class="share-btn" href="https://wa.me/?text=推荐免费的AI工具%20https://codotong.github.io/donate">💬 WhatsApp</a>
<a class="share-btn" href="https://t.me/share/url?url=https://codotong.github.io/donate">✈️ Telegram</a>
</div>
</div>

<script>
function showTool(n) {
  document.querySelectorAll('.card[id^="tool"]').forEach(c => c.classList.add('hidden'));
  document.getElementById('tool'+n).classList.remove('hidden');
}
async function process(type) {
    const input = document.getElementById('input' + type).value;
    const output = document.getElementById('output' + type);
    if (!input.trim()) { output.innerHTML = '<span style="color:#ff6b6b">请输入内容</span>'; return; }
    output.innerHTML = '<span style="color:#00d4ff">🤔 AI 思考中...</span>';
    await new Promise(r => setTimeout(r, 1500));
    const responses = {
        1: '📝 润色结果：\n\n' + input + '\n\n💡 优化建议：文章结构清晰，可更简洁有力。',
        2: '📧 邮件：\n\n' + input + '\n\n祝好',
        3: '💡 方案：\n\n1. 方案A\n2. 方案B\n3. 方案C',
        4: '📱 文案：\n\n' + input + '\n\n#分享'
    };
    output.textContent = responses[type];
}
</script>
